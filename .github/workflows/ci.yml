name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    env:
      # dummy key 防止 mem0 / llm-parser 因缺少 API key 而在初始化时抛错
      OPENAI_API_KEY: ci-dummy-key-not-for-real-use

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: TypeScript type check
        run: bun run typecheck
        continue-on-error: true   # dockerode 类型缺失是已知问题，不阻塞 CI

      - name: Run tests
        run: bun test --run

      - name: Build
        run: bun run build:web
